  // ─── Owner typeahead ─────────────────────────────
  // Returns {wrap, input, sugBox} — caller appends wrap wherever needed.
  _buildOwnerInput(opts = {}) {
    const { placeholder = 'Owner', initialValue = '', width = '220px' } = opts;

    const wrap = document.createElement('div');
    wrap.className = 'owner-wrap';
    if (width) wrap.style.width = width;

    const inp = document.createElement('input');
    inp.placeholder = placeholder;
    inp.value = initialValue;
    inp.autocomplete = 'off';

    const sugBox = document.createElement('div');
    sugBox.className = 'owner-suggestions';
    wrap.appendChild(inp);
    wrap.appendChild(sugBox);

    let focusedIdx = -1;

    function buildSuggestions(q) {
      const options = councilOptions().filter(o => o.name);
      const lq = q.toLowerCase();
      const matches = lq
        ? options.filter(o => o.name.toLowerCase().includes(lq) || o.label.toLowerCase().includes(lq))
        : options;
      sugBox.innerHTML = '';
      focusedIdx = -1;
      if (matches.length === 0) { sugBox.classList.remove('open'); return; }
      matches.forEach(o => {
        const item = document.createElement('div');
        item.className = 'owner-suggestion';
        const av = document.createElement('div');
        av.className = 'sug-av';
        av.style.background = avatarColor(o.name || o.label);
        av.textContent = initials(o.name || o.label);
        const nameSpan = document.createElement('span');
        nameSpan.textContent = o.name || o.label;
        const roleSpan = document.createElement('span');
        roleSpan.className = 'sug-role';
        roleSpan.textContent = o.label;
        item.dataset.name = o.name || o.label;
        item.addEventListener('mousedown', e => {
          e.preventDefault();
          inp.value = o.name || o.label;
          sugBox.classList.remove('open');
          inp.dispatchEvent(new Event('change'));
        });
        item.appendChild(av);
        item.appendChild(nameSpan);
        if (o.name) item.appendChild(roleSpan);
        sugBox.appendChild(item);
      });
      sugBox.classList.add('open');
    }

    inp.addEventListener('input',  () => buildSuggestions(inp.value));
    inp.addEventListener('focus',  () => buildSuggestions(inp.value));
    inp.addEventListener('blur',   () => setTimeout(() => sugBox.classList.remove('open'), 120));
    inp.addEventListener('keydown', e => {
      const items = sugBox.querySelectorAll('.owner-suggestion');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        focusedIdx = Math.min(focusedIdx + 1, items.length - 1);
        items.forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        focusedIdx = Math.max(focusedIdx - 1, 0);
        items.forEach((el, i) => el.classList.toggle('focused', i === focusedIdx));
      } else if (e.key === 'Enter' || e.key === 'Tab') {
        if (focusedIdx >= 0 && items[focusedIdx]) {
          e.preventDefault();
          inp.value = items[focusedIdx].dataset.name;
          sugBox.classList.remove('open');
          inp.dispatchEvent(new Event('change'));
        }
      } else if (e.key === 'Escape') {
        sugBox.classList.remove('open');
      }
    });

    return { wrap, input: inp, sugBox };
  },

  // _buildInlineFields — always-editable stewardship grid.
  // Text fields use contenteditable; selects are always visible.
  // Changes auto-save on blur/change with no explicit Save button.
  _buildInlineFields(p) {
    const g = document.createElement('div');
    g.className = 'field-grid';

    const save = () => {
      // Stewardship edits do not count as "discussed" — only notes and action changes do
      saveState();
      UI.renderAll();
    };

    // Helper: inline text field
    const textField = (label, getValue, setValue, opts) => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      if (opts && opts.fullWidth) wrap.style.gridColumn = '1/-1';
      const lbl = document.createElement('label');
      lbl.textContent = label;
      const inp = document.createElement('input');
      inp.value = getValue();
      inp.style.cssText = 'border:none;border-bottom:1px solid transparent;background:transparent;padding:2px 0;font-size:13.5px;color:var(--ink);width:100%;outline:none;font-family:inherit;transition:border-color 0.15s;cursor:text;';
      inp.addEventListener('focus', () => { inp.style.borderBottomColor = 'var(--accent)'; inp.style.background = 'rgba(20,115,181,0.04)'; inp.style.borderRadius = '3px'; inp.style.padding = '2px 4px'; });
      inp.addEventListener('blur', () => { inp.style.borderBottomColor = 'transparent'; inp.style.background = 'transparent'; inp.style.padding = '2px 0'; const v = inp.value.trim(); if (v !== getValue()) { setValue(v); save(); } });
      inp.addEventListener('click', e => e.stopPropagation());
      wrap.appendChild(lbl); wrap.appendChild(inp);
      return wrap;
    };

    // Helper: date field
    const dateField = (label, getValue, setValue) => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      const lbl = document.createElement('label');
      lbl.textContent = label;
      const inp = document.createElement('input');
      inp.type = 'date'; inp.value = getValue();
      inp.style.cssText = 'border:none;border-bottom:1px solid transparent;background:transparent;padding:2px 0;font-size:13.5px;color:var(--ink);width:100%;outline:none;font-family:inherit;transition:border-color 0.15s;cursor:pointer;';
      inp.addEventListener('focus', () => { inp.style.borderBottomColor = 'var(--accent)'; });
      inp.addEventListener('blur', () => { inp.style.borderBottomColor = 'transparent'; });
      inp.addEventListener('change', e => { e.stopPropagation(); setValue(inp.value); save(); });
      inp.addEventListener('click', e => e.stopPropagation());
      wrap.appendChild(lbl); wrap.appendChild(inp);
      return wrap;
    };

    // Helper: select field
    const selectField = (label, options, getValue, setValue, opts) => {
      const wrap = document.createElement('div');
      wrap.className = 'field';
      if (opts && opts.fullWidth) wrap.style.gridColumn = '1/-1';
      const lbl = document.createElement('label');
      lbl.textContent = label;
      const sel = document.createElement('select');
      sel.style.cssText = 'border:none;border-bottom:1px solid transparent;background:transparent;padding:2px 0;font-size:13.5px;color:var(--ink);width:100%;outline:none;font-family:inherit;transition:border-color 0.15s;cursor:pointer;appearance:auto;';
      sel.addEventListener('focus', () => { sel.style.borderBottomColor = 'var(--accent)'; });
      sel.addEventListener('blur', () => { sel.style.borderBottomColor = 'transparent'; });
      const blank = document.createElement('option');
      blank.value = ''; blank.textContent = '—';
      sel.appendChild(blank);
      options.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.id; opt.textContent = o.label;
        if (o.id === getValue()) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', e => { e.stopPropagation(); setValue(sel.value); save(); });
      sel.addEventListener('click', e => e.stopPropagation());
      wrap.appendChild(lbl); wrap.appendChild(sel);
      return wrap;
    };

    // Brother / Sister selector
    const genderWrap = document.createElement('div');
    genderWrap.className = 'field';
    const genderLbl = document.createElement('label');
    genderLbl.textContent = 'Type';
    const genderSel = document.createElement('select');
    genderSel.style.cssText = 'border:none;border-bottom:1px solid transparent;background:transparent;padding:2px 0;font-size:13.5px;color:var(--ink);width:100%;outline:none;font-family:inherit;transition:border-color 0.15s;cursor:pointer;appearance:auto;';
    genderSel.addEventListener('focus', () => { genderSel.style.borderBottomColor = 'var(--accent)'; });
    genderSel.addEventListener('blur',  () => { genderSel.style.borderBottomColor = 'transparent'; });
    [['u','— Select —'],['f','Sister'],['m','Brother'],['family','Family']].forEach(([val,lbl]) => {
      const opt = document.createElement('option');
      opt.value = val; opt.textContent = lbl;
      if ((p.gender||'u') === val) opt.selected = true;
      genderSel.appendChild(opt);
    });
    genderSel.addEventListener('change', e => {
      e.stopPropagation();
      p.gender = genderSel.value;
      saveState();
      // Re-render covenant path so steps update (e.g. priesthood appears/disappears)
      const cpContainer = document.getElementById('d-covenant-path');
      if (cpContainer) renderCovenantPath(p, cpContainer);
      UI.renderAll();
    });
    genderSel.addEventListener('click', e => e.stopPropagation());
    genderWrap.appendChild(genderLbl);
    genderWrap.appendChild(genderSel);
    // genderWrap appended at the end below (bottom-right of the grid)

    g.appendChild(textField('Family / last name', () => p.familyName, v => { if(v) p.familyName = v; }));
    g.appendChild(textField('First name(s)', () => p.firstNames||'', v => { p.firstNames = v; }));
    g.appendChild(textField('Submitted by', () => p.submittedBy||'', v => { p.submittedBy = v; }));
    g.appendChild(dateField('Date submitted', () => p.dateSubmitted||'', v => { p.dateSubmitted = v; }));
    g.appendChild(selectField('Org steward', ORGS, () => p.orgId||'', v => { p.orgId = v; }));
    // Bishopric support — dynamic dropdown from council config
    const bishWrap = document.createElement('div');
    bishWrap.className = 'field';
    const bishLbl = document.createElement('label');
    bishLbl.textContent = 'Bishopric support';
    const bishopricRoles = ['bishop','counselor1','counselor2'];
    const bishSel = document.createElement('select');
    bishSel.style.cssText = 'border:none;border-bottom:1px solid transparent;background:transparent;padding:2px 0;font-size:13.5px;color:var(--ink);width:100%;outline:none;font-family:inherit;transition:border-color 0.15s;cursor:pointer;appearance:auto;';
    bishSel.addEventListener('focus', () => { bishSel.style.borderBottomColor = 'var(--accent)'; });
    bishSel.addEventListener('blur',  () => { bishSel.style.borderBottomColor = 'transparent'; });
    const bishBlank = document.createElement('option');
    bishBlank.value = ''; bishBlank.textContent = '— Unassigned —';
    bishSel.appendChild(bishBlank);
    const cfg = loadCouncil();
    bishopricRoles.forEach(rid => {
      const role = COUNCIL_ROLES.find(r => r.id === rid);
      if (!role) return;
      const name = (cfg[rid] || '').trim();
      const opt = document.createElement('option');
      opt.value = name || role.label;
      opt.textContent = name ? `${name} — ${role.label}` : role.label;
      if ((p.bishopricSupport||'') === opt.value) opt.selected = true;
      bishSel.appendChild(opt);
    });
    // Free text option + legacy value
    const otherOpt = document.createElement('option');
    otherOpt.value = '__other__'; otherOpt.textContent = 'Other…';
    bishSel.appendChild(otherOpt);
    if (p.bishopricSupport && !['', ...bishopricRoles.map(rid => { const n=(cfg[rid]||'').trim(); return n||COUNCIL_ROLES.find(r=>r.id===rid)?.label||''; })].includes(p.bishopricSupport)) {
      const legacyOpt = document.createElement('option');
      legacyOpt.value = p.bishopricSupport; legacyOpt.textContent = p.bishopricSupport;
      legacyOpt.selected = true;
      bishSel.insertBefore(legacyOpt, otherOpt);
    }
    bishSel.addEventListener('change', e => {
      e.stopPropagation();
      if (bishSel.value === '__other__') {
        const val = prompt('Enter name:');
        if (val && val.trim()) { p.bishopricSupport = val.trim(); save(); }
        else bishSel.value = p.bishopricSupport || '';
      } else {
        p.bishopricSupport = bishSel.value;
        save();
      }
    });
    bishSel.addEventListener('click', e => e.stopPropagation());
    bishWrap.appendChild(bishLbl);
    bishWrap.appendChild(bishSel);
    g.appendChild(bishWrap);
    g.appendChild(selectField('Work of Salvation focus', FOCUSES, () => p.focusId||'', v => { p.focusId = v; }));

    // Brother or Sister — sits next to Focus on the right
    g.appendChild(genderWrap);

    return g;
  },

  // Stamp is applied automatically on any write — no manual toggle needed

  _promptArchive(pid) {

  // ─── Add modal ───────────────────────────────────

  openAdd(queueIt) {
    this.editingId = null;
    this.addQueueOnCreate = !!queueIt;
    document.getElementById('add-title').textContent = 'Add individual';
    document.getElementById('add-save-btn').textContent = queueIt ? 'Add & queue' : 'Add';

    document.getElementById('add-fields').innerHTML = `
      <div class="field" style="grid-column:1/-1"><label>Name *</label><input id="nf-name" placeholder="e.g. Sofia Garcia" autofocus></div>
      <div class="field" id="nf-by-field"><label>Submitted by</label></div>
      <div class="field"><label>Date submitted</label><input type="date" id="nf-date" value="${todayISO()}"></div>
      <div class="field"><label>Org steward</label><select id="nf-org"><option value="">— Select —</option>${orgOpts}</select></div>
      <div class="field"><label>Bishopric support</label><select id="nf-bish"><option value="">— Unassigned —</option>${['bishop','counselor1','counselor2'].map(rid=>{const role=COUNCIL_ROLES.find(r=>r.id===rid);const name=(loadCouncil()[rid]||'').trim();const val=name||role.label;return `<option value="${esc(val)}">${esc(name?name+' — '+role.label:role.label)}</option>`;}).join('')}<option value="__other__">Other…</option></select></div>
      <div class="field"><label>Work of Salvation focus</label><select id="nf-focus"><option value="">— Select —</option>${focusOpts}</select></div>

      <div class="field" style="grid-column:1/-1"><label>Initial note / context</label><textarea id="nf-note" placeholder="Why is the council discussing this person?"></textarea></div>`;
    document.getElementById('modal-add').style.display = 'flex';
    // Build Submitted By typeahead after innerHTML is rendered
    const byField = document.getElementById('nf-by-field');
    if (byField) {
      const byObj = UI._buildOwnerInput({ placeholder: 'e.g. Sister Lim', initialValue: App.currentUser||'', width: '100%' });
      byObj.input.id = 'nf-by';
      byField.appendChild(byObj.wrap);

  closeAdd() {
    document.getElementById('modal-add').style.display = 'none';
  },

  saveAdd() {
    const fullName = document.getElementById('nf-name')?.value.trim();
    if (!fullName) { toast('Name is required'); return; }
    // Split into firstNames + familyName for sorting/avatar compatibility
    const parts = fullName.split(/\s+/);
    const familyName = parts.length > 1 ? parts[parts.length - 1] : fullName;
    const firstNames = parts.length > 1 ? parts.slice(0, -1).join(' ') : '';
    const id = 'p' + Date.now() + Math.random().toString(36).slice(2,5);
    const note = document.getElementById('nf-note')?.value.trim();
    const user = App.currentUser || document.getElementById('nf-by')?.value.trim() || 'Ward Council';
    const p = {
      id, familyName, firstNames,
      submittedBy: document.getElementById('nf-by')?.value.trim()||'',
      dateSubmitted: document.getElementById('nf-date')?.value||'',
      orgId:       document.getElementById('nf-org')?.value||'',
      focusId:     document.getElementById('nf-focus')?.value||'',
      bishopricSupport: (() => { const v = document.getElementById('nf-bish')?.value||''; return v === '__other__' ? '' : v; })(),
      gender: document.getElementById('nf-gender')?.value || 'u',
      covenantPath: [],
      currentStep: null,
      status: 'active', archivedAt:null, archiveNote:'',
      queuedFor: this.addQueueOnCreate ? state.meetingDate : null,
      lastDiscussed: null,
      actions: [],
      history: note ? [{id:'h'+Date.now(),at:new Date().toISOString(),author:user,text:note,actionId:null}] : [],
    };
    state.people.push(p);
    saveState();
    this.closeAdd();
    this.renderAll();
    // Scroll roster to top so new person is findable, not jarring bottom-jump
    requestAnimationFrame(() => {
      const scroll = document.getElementById('roster-scroll');
      if (scroll) scroll.scrollTop = 0;
    });
    toast(fullName + ' added to roster');
  },

  // ─── End meeting modal ────────────────────────────

  openEndMeeting() {
    const discussed = state.people.filter(p=>p.lastDiscussed===state.meetingDate);
    document.getElementById('end-sub').textContent = `${fmtDate(state.meetingDate)} · ${discussed.length} individuals discussed`;
    const body = document.getElementById('end-body');

    // Build report grouped by owner
    const byOwner = {};
    discussed.forEach(p => {
      p.actions.filter(a=>a.open).forEach(a => {
        const owner = a.owner || 'Unassigned';
        if (!byOwner[owner]) byOwner[owner] = [];
        byOwner[owner].push({person:p, action:a});
      });
    });
    const owners = Object.keys(byOwner).sort((a,b)=>a==='Unassigned'?1:b==='Unassigned'?-1:a.localeCompare(b));

    let html = '';
    if (discussed.length === 0) {
      html = `<p style="color:var(--ink-3);font-style:italic;">No individuals were updated this meeting yet.</p>`;
    } else {
      html += `<div class="report-section"><h3>Discussed today (${discussed.length})</h3>`;
      discussed.forEach(p => {
        html += `<div class="report-row"><div class="report-who">${esc(displayName(p))}</div>
          <div class="report-action" style="color:var(--ink-3);font-style:italic;">${openActionCount(p)} open action${openActionCount(p)!==1?'s':''}</div></div>`;
      });
      html += `</div>`;

      if (owners.length > 0) {
        html += `<div class="report-section"><h3>Open actions by owner</h3>`;
        owners.forEach(owner => {
          byOwner[owner].forEach(({person:p, action:a}) => {
            html += `<div class="report-row">
              <div class="report-who">${esc(displayName(p))}</div>
              <div class="report-action">${esc(a.text)}</div>
              <div class="report-owner">${esc(owner)}</div>
            </div>`;
          });
        });
        html += `</div>`;
      }

      const nextDate = nextSundayISO();
      html += `<div style="margin-top:14px;padding:12px 14px;background:var(--sky);border-radius:8px;font-size:13px;color:var(--ink-2);">
        <strong>After ending:</strong> Queue will auto-rebuild from open actions for the next meeting (${fmtDate(nextDate)}). 
        Hand-added names without open actions cleared from queue. Permanent record of who was discussed kept on each card.
      </div>`;
    }
    body.innerHTML = html;
    document.getElementById('modal-end').style.display = 'flex';
  },

  closeEndMeeting() {
    document.getElementById('modal-end').style.display = 'none';
  },

  confirmEndMeeting() {
    App.endMeeting();
    this.closeEndMeeting();
    toast('Meeting ended — queue rebuilt for next Sunday');
  },

  // ─── Sync modal ──────────────────────────────────

  _printCurrentMeeting() {
    const date = state.meetingDate;
    const queue = state.people.filter(p =>
      p.status === 'active' && (p.queuedFor === date || p.actions.some(a => a.open))
    );
    const discussed = queue.filter(p => p.lastDiscussed === date);

    const records = discussed.map(p => {
      const todayNotes = (p.history || []).filter(h =>
        !h.actionId && h.at && h.at.slice(0,10) === date
      );
      const openActs   = (p.actions || []).filter(a => a.open);
      const closedToday = (p.actions || []).filter(a =>
        !a.open && a.closedAt && a.closedAt.slice(0,10) === date
      );
      return {
        name: displayName(p),
        org: orgById(p.orgId)?.label || '',
        focus: focusById(p.focusId)?.label || '',
        bishopricSupport: p.bishopricSupport || '',
        notes: todayNotes.map(n => ({ text: n.text, author: n.author })),
        openActions: openActs.map(a => ({ text: a.text, owner: a.owner, notes: a.notes || [] })),
        closedToday: closedToday.map(a => ({ text: a.text, owner: a.owner, closedNote: a.closedNote || '', notes: a.notes || [] })),
      };
    });

    const ao = {};
    // Owner summary covers ALL open actions in the queue, not just discussed today
    queue.forEach(p => {
      (p.actions || []).filter(a => a.open).forEach(a => {
        if (!ao[a.owner]) ao[a.owner] = [];
        ao[a.owner].push({ person: displayName(p), action: a.text });
      });
    });

    this._renderPrintReport(date, records, ao);
  },

const App = {
  currentUser: localStorage.getItem('ct-user') || '',

  setCurrentUser(v) { this.currentUser = v; localStorage.setItem('ct-user', v); },
  setMeetingDate(v) { state.meetingDate = v; saveState(); UI.updateBadges(); UI.renderQueue(); },

  // Auto-stamp lastDiscussed on any write during the current meeting
  markDiscussed(pid) {
    const p = personById(pid);
    if (p && p.lastDiscussed !== state.meetingDate) {
      p.lastDiscussed = state.meetingDate;
    }
  },

  addAction(pid, text, owner) {
    if (!text) { toast('Action text is required'); return; }
    const p = personById(pid);
    if (!p) return;
    this.markDiscussed(pid);
    const id = 'a' + Date.now() + Math.random().toString(36).slice(2,5);
    p.actions.push({id, text, owner, open:true,
      createdAt:new Date().toISOString(),
      createdMeeting:state.meetingDate,
      notes:[],
      closedAt:null, closedBy:'', closedNote:''});
    // Auto-queue the person for this meeting
    if (p.queuedFor !== state.meetingDate) p.queuedFor = state.meetingDate;
    saveState();
    UI.renderAll();
    UI.refreshDetail();
    toast('Action added');
  },

  addActionNote(pid, aid, text) {
    if (!text) return;
    const p = personById(pid);
    if (!p) return;
    const a = p.actions.find(x=>x.id===aid);
    if (!a) return;
    if (!a.notes) a.notes = [];
    a.notes.push({
      id:'an'+Date.now(),
      at:new Date().toISOString(),
      author:this.currentUser||'Ward Council',
      text,
    });
    this.markDiscussed(pid);
    saveState();
    UI.refreshDetail();
  },


  closeAction(pid, aid, note) {
    const p = personById(pid);
    if (!p) return;
    const a = p.actions.find(x=>x.id===aid);
    if (!a) return;
    this.markDiscussed(pid);
    const user = this.currentUser || 'Ward Council';
    a.open = false;
    a.closedAt = new Date().toISOString();
    a.closedBy = user;
    a.closedNote = note || '';
    // Add history entry, including any notes logged against the action
    p.history.push({
      id:'h'+Date.now(),
      at:new Date().toISOString(),
      author:user,
      text:`Closed action: ${a.text}`,
      note: note || '',
      actionId:aid,
      actionNotes: (a.notes && a.notes.length) ? [...a.notes] : [],
    });
    // If closing this action leaves no open actions remaining, anchor the person
    // to the current meeting so they stay in the queue until End Meeting rather
    // than silently sliding into "Added this week".
    const stillOpen = p.actions.some(x => x.open);
    if (!stillOpen && p.queuedFor !== state.meetingDate) {
      p.queuedFor = state.meetingDate;
    }
    saveState();
    UI.renderAll();
    UI.refreshDetail();
    toast('Action closed');
  },


  deleteAction(pid, aid) {
    const p = personById(pid);
    if (!p) return;
    p.actions = p.actions.filter(a => a.id !== aid);
    saveState();
    UI.renderAll();
    UI.refreshDetail();
  },

  deleteNote(pid, hid) {
    const p = personById(pid);
    if (!p) return;
    p.history = p.history.filter(h => h.id !== hid);
    saveState();
    UI.renderAll();
    UI.refreshDetail();
  },

  addNote(pid, text) {
    if (!text) { toast('Note cannot be empty'); return; }
    const p = personById(pid);
    if (!p) return;
    this.markDiscussed(pid);
    p.history.push({
      id:'h'+Date.now(),
      at:new Date().toISOString(),
      author:this.currentUser||'Ward Council',
      text, actionId:null,
    });
    saveState();
    UI.renderAll();
    UI.refreshDetail();
  },

  archivePerson(pid, reason) {
    const p = personById(pid);
    if (!p) return;
    p.status = 'archived';
    p.archivedAt = todayISO();
    p.archiveNote = reason || '';
    p.queuedFor = null;
    saveState();
    UI.closeDetail();
    UI.renderAll();
    toast(displayName(p) + ' archived');
  },

  restorePerson(pid) {
    const p = personById(pid);
    if (!p) return;
    p.status = 'active';
    p.archivedAt = null;
    saveState();
    UI.closeDetail();
    UI.renderAll();
    toast(displayName(p) + ' restored to roster');
  },

  deletePerson(pid) {
    const p = personById(pid);
    if (!p) return;
    if (!confirm(`Permanently delete ${displayName(p)}? This cannot be undone.`)) return;
    state.people = state.people.filter(x=>x.id!==pid);
    saveState();
    UI.renderAll();
    toast(displayName(p) + ' permanently deleted');
  },

  endMeeting() {
    const nextDate = nextSundayISO();

    // Capture meeting snapshot before clearing
    const queue = state.people.filter(p =>
      p.status === 'active' && (p.queuedFor === state.meetingDate || p.actions.some(a => a.open))
    );
    const discussed = queue.filter(p => p.lastDiscussed === state.meetingDate);
    const openActions = [];
    queue.forEach(p => {
      (p.actions || []).filter(a => a.open).forEach(a => {
        openActions.push({ person: displayName(p), action: a.text, owner: a.owner });
      });
    });

    // Rich per-person records for the print report
    const peopleRecords = discussed.map(p => {
      const org = orgById(p.orgId);
      const focus = focusById(p.focusId);
      const todayNotes = (p.history || []).filter(h =>
        !h.actionId && h.at && h.at.slice(0,10) === state.meetingDate
      );
      const openActs = (p.actions || []).filter(a => a.open);
      const closedToday = (p.actions || []).filter(a =>
        !a.open && a.closedAt && a.closedAt.slice(0,10) === state.meetingDate
      );
      return {
        name: displayName(p),
        org: org?.label || '',
        focus: focus?.label || '',
        bishopricSupport: p.bishopricSupport || '',
        notes: todayNotes.map(n => ({ text: n.text, author: n.author })),
        openActions: openActs.map(a => ({ text: a.text, owner: a.owner, notes: a.notes || [] })),
        closedToday: closedToday.map(a => ({ text: a.text, owner: a.owner, closedNote: a.closedNote || '', notes: a.notes || [] })),
      };
    });

    if (!state.meetingArchive) state.meetingArchive = [];
    state.meetingArchive.unshift({
      id: 'm' + Date.now(),
      date: state.meetingDate,
      discussed: discussed.map(p => ({ name: displayName(p), org: orgById(p.orgId)?.label || '', focus: focusById(p.focusId)?.label || '' })),
      openActions,
      peopleRecords,
      savedAt: new Date().toISOString(),
    });

    // Clear hand-added queuedFor stamps for people without open actions.
    state.people.forEach(p => {
      if (p.status !== 'active') return;
      if (p.queuedFor === state.meetingDate) p.queuedFor = null;
    });
    // Keep lastDiscussed as-is (permanent record), just move the meeting date forward
    state.meetingDate = nextDate;
    saveState();
    UI.renderAll();
  },
};

const Sync = {
  url: '', timer: null, pollTimer: null, lastHash: localStorage.getItem(HASH_KEY)||'',
  status: 'unconfigured', lastSyncAt: null, lastError: null,

  startPolling() {
    clearInterval(this.pollTimer);
    if (!this.url) return;
    this.pollTimer = setInterval(() => {
      if (!document.hidden) this.pull();
    }, 30000);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && this.url) this.pull();
    }, { once: false });
  },

  init() {
    let cfg = {};
    try { cfg = JSON.parse(localStorage.getItem(SYNC_CONFIG_KEY)||'{}'); }
    catch(e) { console.warn('[sync] config corrupt, resetting:', e); localStorage.removeItem(SYNC_CONFIG_KEY); }
    this.url = cfg.url || 'https://script.google.com/macros/s/AKfycbzU6zc1qLIlYSwWnhV7LA6DlUoWXRtrJok-Fd8mgpR-HxTMjy-v2MzbWl4wXeheyeTTbw/exec';
    this.status = this.url ? 'idle' : 'unconfigured';
    this.updatePill();
    if (this.url) this.pull();
    this.startPolling();
    window.addEventListener('online', () => { if (this.status==='offline') this.push(state); });
  },

  schedule(s) {
    clearTimeout(this.timer);
    this.timer = setTimeout(()=>this.push(s), 1200);
  },

  hash(s) {
    const {savedAt,...rest} = s;
    const str = JSON.stringify(rest);
    let h = 0;
    for (let c of str) h = (Math.imul(31,h) + c.charCodeAt(0))|0;
    return h.toString();
  },

  setUrl(url) {
    this.url = (url||'').trim();
    localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify({url:this.url}));
    this.status = this.url ? 'idle' : 'unconfigured';
    this.updatePill();
  },

  async push(s) {
    if (!this.url) return;
    const h = this.hash(s);
    if (h === this.lastHash) return;
    this.lastHash = h;
    localStorage.setItem(HASH_KEY, h);
    this.setStatus('syncing');
    try {
      const r = await fetch(this.url, {
        method:'POST', redirect:'follow',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify({action:'save', data:JSON.stringify(s)}),
      });
      const j = await r.json();
      if (!j.ok) throw new Error(j.error||'save failed');
      this.lastSyncAt = Date.now();
      this.setStatus('online');
    } catch(e) {
      console.warn('[sync]',e);
      this.setStatus('offline', e.message);
    }
  },

  async pull() {
    if (!this.url) return null;
    this.setStatus('syncing');
    try {
      const r = await fetch(this.url+'?action=load', {redirect:'follow'});
      const j = await r.json();
      if (j.empty) { this.setStatus('online'); return null; }
      if (!j.ok) throw new Error(j.error);
      const cloud = typeof j.data==='string' ? JSON.parse(j.data) : j.data;
      if (!cloud || !cloud.people) { this.setStatus('online'); return null; }
      const cloudTime = cloud.savedAt||0;
      const localTime = state.savedAt||0;
      if (cloudTime > localTime) {
        // Backfill new fields on any cloud people that lack them
        (cloud.people || []).forEach(p => {
          if (!p.covenantPath) p.covenantPath = [];
          if (!p.gender) p.gender = 'u';
          if (p.currentStep === undefined) p.currentStep = null;
        });
        state = cloud;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
        // Sync council config to localStorage so dropdowns work immediately
        if (state.council) {
          try { localStorage.setItem(COUNCIL_KEY, JSON.stringify(state.council)); } catch(e){}
        }
        UI.renderAll();
        toast('Loaded from cloud');
      }
      // Local data is newer overall, but always sync council from cloud —
      // council is admin config, not user data, so cloud always wins for it.
      if (cloudTime <= localTime && cloud.council) {
        const cloudHasCouncil = Object.values(cloud.council).some(v => v && v.trim());
        if (cloudHasCouncil) {
          state.council = cloud.council;
          try { localStorage.setItem(COUNCIL_KEY, JSON.stringify(state.council)); } catch(e) {}
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
          UI.renderAll();
        }
      }
      this.lastSyncAt = Date.now();
      this.setStatus('online');
      return cloud;
    } catch(e) {
      this.setStatus('offline', e.message);
      return null;
    }
  },

  async test(url) {
    const r = await fetch((url||this.url)+'?action=status', {redirect:'follow'});
    if (!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error||'not ok');
    return j;
  },

  setStatus(s, err) {
    this.status = s;
    this.lastError = err||null;
    this.updatePill();
  },

  updatePill() {
    const pill = document.getElementById('sync-pill');
    const txt  = document.getElementById('sync-pill-text');
    if (!pill) return;
    pill.className = 'sync-pill ' + this.status;
    if (!this.url)              txt.textContent = 'Connect sheet';
    else if (this.status==='syncing')  txt.textContent = 'Syncing…';
    else if (this.status==='online')   txt.textContent = this.lastSyncAt ? 'Saved' : 'Connected';
    else if (this.status==='offline')  txt.textContent = 'Offline';
    else                               txt.textContent = 'Connected';
    // Update mobile topbar sync indicator
    const mobIcon = document.getElementById('mob-sync-icon');
    const mobText = document.getElementById('mob-sync-text');
    if (mobIcon) {
      if (this.status === 'syncing')      { mobIcon.textContent = '⟳'; if(mobText) mobText.textContent = 'Syncing…'; }
      else if (this.status === 'online')  { mobIcon.textContent = '✓'; if(mobText) mobText.textContent = this.lastSyncAt ? 'Saved' : ''; }
      else if (this.status === 'offline') { mobIcon.textContent = '⚠'; if(mobText) mobText.textContent = 'Offline'; }
      else                                { mobIcon.textContent = '☁'; if(mobText) mobText.textContent = ''; }
    }
  },

  renderPanel() {
    const body = document.getElementById('sync-body');
    const statusColor = !this.url ? '#aac0d4' : this.status==='online'||this.status==='idle' ? '#4db88a' : this.status==='offline' ? '#e8a050' : '#7ab8e8';
    const statusText  = !this.url ? 'Not connected' : this.status==='syncing' ? 'Syncing…' : this.status==='online'||this.status==='idle' ? 'Connected' : 'Offline';
    const gs = APPS_SCRIPT_SOURCE;
    body.innerHTML = `
      <div class="sync-status-row">
        <div class="sync-dot" style="background:${statusColor}"></div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13.5px;">${statusText}</div>
          ${this.lastError?`<div style="font-size:11.5px;color:#b03030;margin-top:2px;">${esc(this.lastError)}</div>`:''}
          ${this.url?`<div style="font-size:11px;color:var(--ink-3);font-family:monospace;margin-top:2px;word-break:break-all;">${esc(this.url.length>60?this.url.slice(0,60)+'…':this.url)}</div>`:''}
        </div>
      </div>
      <div style="margin-bottom:8px;">
        <label style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);display:block;margin-bottom:5px;">${this.url?'Update URL:':'Paste Web App URL:'}</label>
        <input id="sync-url-input" value="${esc(this.url)}" placeholder="https://script.google.com/macros/s/…"
          style="width:100%;border:1px solid var(--line-2);border-radius:6px;padding:7px 9px;font-size:13px;background:#fafbfd;outline:none;margin-bottom:8px;">
        <button class="btn primary" style="width:100%;justify-content:center;" onclick="Sync._connect()">
          ${this.url?'Update URL':'+ Connect to Google Sheets'}
        </button>
      </div>
      ${this.url?`<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;">
        <button class="btn sm" onclick="Sync.push(state).then(()=>toast('Pushed to cloud'))">↑ Push now</button>
        <button class="btn sm" onclick="Sync.pull().then(()=>Sync.renderPanel())">↓ Pull latest</button>
        <button class="btn sm danger" onclick="Sync._disconnect()">Disconnect</button>
      </div>`:''}
      ${!this.url?`<div style="margin-top:14px;padding:12px 14px;background:#fdf6e3;border:1px solid rgba(122,96,16,.20);border-radius:8px;font-size:12.5px;color:#7a6010;line-height:1.6;">
        <strong style="color:#5a4010;">Setup (3 steps):</strong>
        <ol style="padding-left:18px;margin:6px 0 10px;">
          <li>Open <a href="https://script.google.com" target="_blank" style="color:var(--accent)">script.google.com</a> → New project</li>
          <li>Replace all code with the script below → Save → Deploy → New deployment → Web App → Execute as <em>Me</em> → Access <em>Anyone</em> → Deploy</li>
          <li>Copy the Web App URL, paste above, click Connect</li>
        </ol>
        <div style="border:1px solid var(--line-2);border-radius:7px;overflow:hidden;background:var(--surface);">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid var(--line);background:var(--surface-2);">
            <span style="font-family:monospace;font-size:11px;color:var(--ink-3);">Code.gs</span>
            <button class="btn sm" onclick="navigator.clipboard.writeText(APPS_SCRIPT_SOURCE).then(()=>toast('Copied!'))">Copy</button>
          </div>
          <pre style="margin:0;padding:10px 14px;font-family:monospace;font-size:11px;color:var(--ink-2);overflow:auto;max-height:200px;white-space:pre;tab-size:2;">${esc(gs)}</pre>
        </div>
      </div>`:''}
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line);">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin-bottom:8px;">Local JSON backup</div>
        <div style="display:flex;gap:8px;">
          <button class="btn sm" onclick="Sync._exportJSON()">↓ Export JSON</button>
          <button class="btn sm" onclick="document.getElementById('json-import').click()">↑ Import JSON</button>
          <input id="json-import" type="file" accept=".json" style="display:none" onchange="Sync._importJSON(this)">
        </div>
      </div>`;
  },

  async _connect() {
    const url = document.getElementById('sync-url-input')?.value.trim();
    if (!url) { toast('Please paste a URL'); return; }
    const btn = document.querySelector('#modal-sync .btn.primary');
    if (btn) { btn.textContent='Testing…'; btn.disabled=true; }
    try {
      const ping = await this.test(url);
      const ver = ping.version ? ` (v${ping.version})` : '';
      this.setUrl(url);
      const cloud = await this.pull();
      toast(cloud ? `Connected${ver} — loaded from cloud` : `Connected${ver} — board saved to cloud`);
      if (!cloud) await this.push(state);
      this.renderPanel();
    } catch(e) {
      toast('Could not connect: '+e.message);
      if (btn) { btn.textContent='+ Connect to Google Sheets'; btn.disabled=false; }
    }
  },

  _disconnect() {
    if (!confirm('Disconnect Google Sheets? Data stays local.')) return;
    this.setUrl('');
    this.lastHash = '';
    localStorage.removeItem(HASH_KEY);
    this.renderPanel();
    toast('Disconnected');
  },

  _exportJSON() {
    const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'council-together-'+todayISO()+'.json';
    a.click();
  },

  _importJSON(input) {
    const f = input.files?.[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => {
      try {
        const d = JSON.parse(e.target.result);
        if (!d.people) { toast('Not a valid Council Together export'); return; }
        if (!confirm(`Import ${d.people.length} individuals? Replaces current data.`)) return;
        // Backfill new fields on imported people
        (d.people || []).forEach(p => {
          if (!p.covenantPath) p.covenantPath = [];
          if (!p.gender) p.gender = 'u';
          if (p.currentStep === undefined) p.currentStep = null;
        });
        state = d;
        saveState();
        UI.renderAll();
        UI.closeSync();
        toast('Imported successfully');
      } catch(err) { toast('Could not parse file'); }
    };
    r.readAsText(f);
  },
};

// ══════════════════════════════════════════════════════
// APPS SCRIPT SOURCE
// ══════════════════════════════════════════════════════

const APPS_SCRIPT_SOURCE = `/**
 * Ward Org Chart — Google Apps Script cloud sync backend (v8)
 *
 * Deploy: Extensions → Apps Script → paste → Deploy → New deployment
 *   - Type: Web app,  Execute as: Me,  Who has access: Anyone
 * After ANY change: Deploy → Manage deployments → edit → New version → Deploy.
 *
 * v8 fixes:
 *   - Chunk size reduced from 9000 → 4000 chars. PropertiesService silently
 *     inserts line breaks (\r\n) into values longer than ~8000 chars, causing
 *     write-verify failures. Staying well under that threshold prevents it.
 *   - assembleData() strips any \r or \n from each chunk value on read, as a
 *     belt-and-suspenders guard against any future whitespace insertion.
 *   - Data is raw JSON (no LZString compression), so only printable ASCII +
 *     standard JSON chars — no binary or surrogate issues.
 */

var CHUNK = 4000;  // chars per property (well under the ~8KB corruption threshold)

function doGet(e) {
  var p = (e && e.parameter) || {};
  try {
    if (p.action === 'load')        return handleLoad();
    if (p.action === 'loadbackup')  return handleLoadBackup();
    if (p.action === 'status')      return json({ ok: true, status: 'alive', version: 8 });
    return json({ ok: false, error: 'Unknown GET action: ' + p.action });
  } catch (err) { return json({ ok: false, error: String(err) }); }
}

function doPost(e) {
  try {
    var body = (e && e.postData && e.postData.contents)
      ? JSON.parse(e.postData.contents) : {};
    if (body.action === 'save')   return handleSave(body);
    if (body.action === 'backup') return handleBackup(body);
    return json({ ok: false, error: 'Unknown POST action: ' + body.action });
  } catch (err) { return json({ ok: false, error: String(err) }); }
}

function handleSave(body) {
  var data = String(body.data || '');
  if (!data) return json({ ok: false, error: 'No data in request body' });

  var props = PropertiesService.getScriptProperties();

  // Remove any previous payload chunks.
  clearDataChunks(props);

  // Split into property-sized chunks and store them.
  var n = 0;
  for (var i = 0; i < data.length; i += CHUNK) {
    props.setProperty('data_' + n, data.slice(i, i + CHUNK));
    n++;
  }
  props.setProperty('data_meta', JSON.stringify({
    chunks: n,
    length: data.length,
    savedAt: Date.now()
  }));

  // WRITE-VERIFY: read everything straight back and compare.
  var readback = assembleData(props);
  if (readback !== data) {
    var at = -1;
    for (var k = 0; k < Math.max(readback.length, data.length); k++) {
      if (readback.charAt(k) !== data.charAt(k)) { at = k; break; }
    }
    return json({
      ok: false,
      error: 'Storage verify failed: sent ' + data.length +
             ' chars, read back ' + readback.length +
             ' chars, first diff at index ' + at
    });
  }

  return json({ ok: true, length: data.length, chunks: n, verified: true });
}

function handleLoad() {
  var props = PropertiesService.getScriptProperties();
  var metaRaw = props.getProperty('data_meta');
  if (!metaRaw) return json({ ok: true, compressed: '', empty: true });
  var assembled = assembleData(props);
  if (!assembled) return json({ ok: true, compressed: '', empty: true });
  if (assembled.charAt(0) === '{') return json({ ok: true, data: assembled });
  return json({ ok: true, compressed: assembled, length: assembled.length });
}

function handleBackup(body) {
  var data = String(body.data || '');
  if (!data) return json({ ok: false, error: 'No data in request body' });
  var props = PropertiesService.getScriptProperties();
  var stamp = Utilities.formatDate(new Date(), Session.getScriptTimeZone(), 'M/d/yyyy, HH:mm:ss');
  var oldKeys = props.getProperties();
  for (var k in oldKeys) { if (k.indexOf('backup_') === 0) props.deleteProperty(k); }
  var n = 0;
  for (var i = 0; i < data.length; i += CHUNK) {
    props.setProperty('backup_' + n, data.slice(i, i + CHUNK));
    n++;
  }
  props.setProperty('backup_meta', JSON.stringify({ chunks: n, length: data.length, stamp: stamp }));
  return json({ ok: true, stamp: stamp, length: data.length });
}

function handleLoadBackup() {
  var props = PropertiesService.getScriptProperties();
  var metaRaw = props.getProperty('backup_meta');
  if (!metaRaw) return json({ ok: true, empty: true });
  var meta;
  try { meta = JSON.parse(metaRaw); } catch (e) { return json({ ok: false, error: 'Corrupted backup metadata' }); }
  var out = '';
  for (var i = 0; i < meta.chunks; i++) {
    var c = props.getProperty('backup_' + i);
    if (c === null || c === undefined) return json({ ok: false, error: 'Missing backup chunk ' + i });
    out += c.replace(/[\r\n]/g, '');
  }
  return json({ ok: true, data: out, stamp: meta.stamp || 'unknown', length: out.length });
}

function assembleData(props) {
  var metaRaw = props.getProperty('data_meta');
  if (!metaRaw) return '';
  var meta;
  try { meta = JSON.parse(metaRaw); } catch (e) { return ''; }
  var out = '';
  for (var i = 0; i < meta.chunks; i++) {
    var c = props.getProperty('data_' + i);
    if (c === null || c === undefined) return out;
    out += c.replace(/[\r\n]/g, '');
  }
  return out;
}

function clearDataChunks(props) {
  var all = props.getProperties();
  for (var key in all) {
    if (key === 'data_meta' || key.indexOf('data_') === 0) {
      props.deleteProperty(key);
    }
  }
}

function json(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);
}`;

// ══════════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════════

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let toastTimer;
function toast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(()=>el.remove(), 2800);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modal-detail').classList.contains('open')) UI.closeDetail();
    else if (document.getElementById('modal-add').style.display === 'flex') UI.closeAdd();
    else if (document.getElementById('modal-admin').style.display === 'flex') Admin.close();
    else if (document.getElementById('modal-end').style.display === 'flex') UI.closeEndMeeting();
    else if (document.getElementById('modal-sync').style.display === 'flex') UI.closeSync();
  }
});

// ── Boot ──
UI.init();
MobNav.init();
</script>
